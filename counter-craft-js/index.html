<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Three.js FPS Template</title>

  <link rel="stylesheet" href="./style.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="stats">
      Health: <span id="health">100</span><br />
      Ammo: <span id="ammo">30</span> / <span id="reserve">90</span><br />
      Score: <span id="score">0</span><br />
      Wave: <span id="wave">1</span>
    </div>
    <div id="modeNote">Mouse look: click start first</div>
  </div>

  <div id="damageFlash"></div>

  <div id="overlay">
    <div id="panel">
      <h1>FPS Template</h1>
      <p>Click start, then use WASD to move, mouse to look, left click to shoot, and R to reload.</p>
      <p>Modular Three.js FPS template with GLB weapon support.</p>
      <button id="startButton" class="cs-button">Start Game</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
