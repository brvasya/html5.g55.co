<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Warning Clicker</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe4b5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default; 
        }

        /* HTML UI Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
        }

        #start-screen { background-color: #ffe4b5; }
        #game-over { display: none; background-color: rgba(200, 0, 0, 0.9); color: white; }

        h1 { font-size: clamp(40px, 8vw, 60px); margin: 0; color: #333; }
        #game-over h1 { color: white; }
        p { font-size: clamp(18px, 4vw, 24px); color: #555; padding: 0 20px;}
        #game-over p { color: #ffe; }
        
        .menu-btn {
            display: inline-block;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 24px;
            background-color: white;
            color: #333;
            border: 4px solid #333;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 4px 4px 0 #333;
            transition: all 0.1s;
        }
        
        .menu-btn:hover { background-color: #eee; }
        .menu-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 transparent; }

        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        #game-over .retry-btn { color: red; border-color: red; box-shadow: 4px 4px 0 maroon; }
        #game-over .more-games-btn { color: #ff8c00; border-color: #ff8c00; box-shadow: 4px 4px 0 #c26900; }

        .logo-bottom {
            position: absolute;
            bottom: 30px;
            font-size: 22px;
            font-weight: 900;
            text-decoration: none;
            color: white;
            background-color: #ff4500;
            padding: 12px 25px;
            border-radius: 30px;
            border: 4px solid #c33500;
            box-shadow: 4px 4px 0 #c33500;
            transition: transform 0.1s;
            letter-spacing: 2px;
        }
        
        .logo-bottom:hover { background-color: #ff571a; }
        .logo-bottom:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 transparent; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="overlay">
        <h1>Cat Warning Clicker</h1>
        <p><strong>Tap rapidly</strong> to build your Combo Multiplier.<br>Watch out for <strong>Fake-Outs</strong> at Level 3+!</p>
        <button id="startBtn" class="menu-btn">Play Game</button>
        <a href="https://g55.co/" target="_blank" class="logo-bottom">🎮 G55.CO</a>
    </div>

    <div id="game-over" class="overlay">
        <h1>GAME OVER</h1>
        <p>You got greedy and the cat saw you!</p>
        <p>Level Reached: <strong id="final-level">1</strong></p>
        <p>Final Score: <strong id="final-score">0</strong></p>
        <div class="btn-container">
            <button id="retryBtn" class="menu-btn retry-btn">Try Again</button>
            <a href="https://g55.co/" target="_blank" class="menu-btn more-games-btn">More Games</a>
        </div>
    </div>

    <script>
        // --- Setup Canvas ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let cw, ch;
        let catRadius;
        
        function resizeCanvas() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            ctx.scale(dpr, dpr);
            catRadius = Math.min(cw, ch) * 0.25; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- UI Elements ---
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        
        document.getElementById('startBtn').addEventListener('click', initAndStart);
        document.getElementById('retryBtn').addEventListener('click', startGame);

        // --- Game State Variables ---
        let score = 0;
        let level = 1;
        let nextLevelScore = 150; 
        let isGameOver = false;
        
        let catState = 0; // 0: Safe, 1: Warning, 2: Looking
        let catEmoji = '🐈';
        let catTimer;
        let hasStartedClickingInSafeState = false;
        
        let pointer = { x: -100, y: -100 };
        let clickAnimEndTime = 0;
        let shakeEndTime = 0; 
        
        // COMBO SYSTEM
        let combo = 0;
        let comboMultiplier = 1;
        let lastTapTime = 0;
        
        let particles = [];
        let lastTime = 0;

        // --- Audio System ---
        let audioCtx;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playCombSound(multiplier) { 
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const pitchShift = Math.min(500, multiplier * 40); 
            const baseFreq = 300 + pitchShift + (Math.random() * 100); 
            osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(baseFreq / 2, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWarningSound() { 
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playFakeOutSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(400, t);
            osc.frequency.exponentialRampToValueAtTime(800, t + 0.1); // Quick up
            osc.frequency.exponentialRampToValueAtTime(300, t + 0.3); // Then down
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(t + 0.3);
        }

        function playGameOverSound() { 
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(300, t);
            osc.frequency.exponentialRampToValueAtTime(250, t + 0.2);
            osc.frequency.setValueAtTime(250, t + 0.2);
            osc.frequency.exponentialRampToValueAtTime(200, t + 0.4);
            osc.frequency.setValueAtTime(200, t + 0.4);
            osc.frequency.exponentialRampToValueAtTime(40, t + 1.0); 
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.setValueAtTime(0.2, t + 0.4);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(t + 1.0);
        }

        function playLevelUpSound() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            [440, 554.37, 659.25].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + (i * 0.1));
                gain.gain.setValueAtTime(0, t);
                gain.gain.setValueAtTime(0.2, t + (i * 0.1));
                gain.gain.exponentialRampToValueAtTime(0.001, t + (i * 0.1) + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t + (i * 0.1));
                osc.stop(t + (i * 0.1) + 0.3);
            });
        }

        // --- Game Logic ---
        function initAndStart() {
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            startScreen.style.display = 'none';
            startGame();
        }

        function startGame() {
            score = 0;
            level = 1;
            nextLevelScore = 150; 
            isGameOver = false;
            particles = [];
            clickAnimEndTime = 0;
            shakeEndTime = 0;
            combo = 0;
            comboMultiplier = 1;
            lastTapTime = performance.now();
            
            canvas.style.cursor = 'default';
            gameOverScreen.style.display = 'none';
            
            setCatSafe(); 
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function scheduleNextState() {
            if (isGameOver) return;
            let delay = 0;

            if (catState === 0) { 
                let baseDelay = Math.max(500, 2000 - (level * 150));
                let randDelay = Math.max(300, 2000 - (level * 200));
                delay = baseDelay + Math.random() * randDelay;
                
                catTimer = setTimeout(() => {
                    catState = 1;
                    setCatWarning();
                    playWarningSound();
                    scheduleNextState();
                }, delay);

            } else if (catState === 1) { 
                let baseDelay = Math.max(100, 600 - (level * 50));
                let randDelay = Math.max(50, 300 - (level * 25));
                delay = baseDelay + Math.random() * randDelay;
                
                // AI FAKE-OUT CHANCE (Starts at Level 3. Caps at 35% chance)
                let fakeOutChance = level >= 3 ? Math.min(0.35, (level - 2) * 0.1) : 0;
                let isFakeOut = Math.random() < fakeOutChance;

                catTimer = setTimeout(() => {
                    if (isFakeOut) {
                        playFakeOutSound();
                        spawnFloatingText("Psych!", "#00bfff", -60);
                        setCatSafe(); // Sets back to safe. Will wait for the player's next tap to restart cycle!
                    } else {
                        catState = 2;
                        setCatLooking();
                        scheduleNextState();
                    }
                }, delay);

            } else if (catState === 2) { 
                delay = 800 + Math.random() * 1200; 
                catTimer = setTimeout(() => {
                    setCatSafe();
                }, delay);
            }
        }

        function setCatSafe() { 
            catState = 0; 
            catEmoji = '🐈'; 
            hasStartedClickingInSafeState = false; 
            clearTimeout(catTimer);
        }
        
        function setCatWarning() { catState = 1; catEmoji = '🙀'; }
        function setCatLooking() { catState = 2; catEmoji = '😾'; }

        function levelUp() {
            level += 1;
            nextLevelScore += (level * 150) + 100; 
            playLevelUpSound();
            spawnFloatingText(`LEVEL ${level}!`, "#ff4500", 0);
        }

        function triggerGameOver() {
            isGameOver = true;
            clearTimeout(catTimer);
            canvas.style.cursor = 'default';
            playGameOverSound();
            
            shakeEndTime = performance.now() + 500; 
            
            setTimeout(() => {
                document.getElementById('final-score').innerText = score;
                document.getElementById('final-level').innerText = level;
                gameOverScreen.style.display = 'flex';
            }, 600); 
        }

        // --- Main Canvas Game Loop ---
        function gameLoop(currentTime) {
            if (isGameOver && currentTime > shakeEndTime && gameOverScreen.style.display === 'flex') return;
            requestAnimationFrame(gameLoop);

            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // Handle Combo Decay (Resets if no tap for 0.6 seconds)
            if (!isGameOver && currentTime - lastTapTime > 600 && combo > 0) {
                combo = 0;
                comboMultiplier = 1;
            }

            ctx.clearRect(0, 0, cw, ch);
            ctx.save();
            
            // Screen Shake Juice
            if (currentTime < shakeEndTime) {
                let intensity = (shakeEndTime - currentTime) / 20; 
                let dx = (Math.random() - 0.5) * intensity;
                let dy = (Math.random() - 0.5) * intensity;
                ctx.translate(dx, dy);
            }

            const cx = cw / 2;
            const cy = ch / 2;
            const catSize = catRadius * 2;
            const isSquished = currentTime < clickAnimEndTime;

            // Draw Background Visual Indicator
            if (catState === 1) {
                ctx.fillStyle = 'rgba(255, 100, 100, 0.2)';
                ctx.fillRect(0, 0, cw, ch);
            } else if (catState === 2) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(0, 0, cw, ch);
            }

            // Draw HUD
            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`Level: ${level}`, 20, 40);
            ctx.textAlign = 'right';
            ctx.fillText(`Score: ${score}`, cw - 20, 40);
            
            // Draw Combo Meter
            if (comboMultiplier > 1) {
                ctx.textAlign = 'center';
                let pulse = 1 + Math.sin(currentTime / 100) * 0.05 * comboMultiplier;
                ctx.font = `bold ${24 * pulse}px sans-serif`;
                
                let colors = ['#333', '#ff8c00', '#ff4500', '#ff0000', '#cc00cc'];
                let colorIdx = Math.min(comboMultiplier - 1, colors.length - 1);
                ctx.fillStyle = colors[colorIdx];
                
                ctx.fillText(`Combo x${comboMultiplier}!`, cx, cy - catSize * 0.7);
            } else {
                ctx.textAlign = 'center';
                ctx.fillStyle = '#666';
                ctx.font = '18px sans-serif';
                ctx.fillText('Tap rapidly to build combo!', cx, cy - catSize * 0.7);
            }

            // Draw Warning (!)
            if (catState === 1) {
                ctx.fillStyle = 'red';
                ctx.font = `bold ${catSize * 0.4}px sans-serif`;
                ctx.fillText('!', cx, cy - catSize * 0.5);
            }

            // Draw Cat
            ctx.font = `${catSize * 0.8}px sans-serif`;
            ctx.textBaseline = 'middle';
            
            // Squish animation
            ctx.save();
            ctx.translate(cx, cy);
            if (isSquished) ctx.scale(0.95, 0.95); 
            ctx.fillText(catEmoji, 0, 0);
            ctx.restore();

            // Update & Draw Particles
            updateAndDrawParticles(dt);

            // Draw Sparkles cursor
            if (isSquished) {
                ctx.font = '40px sans-serif';
                ctx.fillText('✨', pointer.x + 20, pointer.y - 20);
            }
            
            ctx.restore(); // Restore from Screen Shake
        }

        // --- Particle System ---
        function spawnHeart(x, y) {
            particles.push({
                type: 'heart',
                x: x + (Math.random() - 0.5) * 60,
                y: y + (Math.random() - 0.5) * 60,
                vy: 60 + Math.random() * 40,
                life: 0.8,
                emoji: '❤️',
                size: 20 + Math.random() * 20
            });
        }
        
        function spawnFloatingScore(x, y, amount, multiplier) {
            let colors = ['#ffffff', '#ff8c00', '#ff4500', '#ff0000', '#cc00cc'];
            let colorIdx = Math.min(multiplier - 1, colors.length - 1);
            
            particles.push({
                type: 'score',
                x: x + (Math.random() - 0.5) * 40,
                y: y - 20,
                vy: 80,
                life: 1.0,
                text: `+${amount}`,
                color: colors[colorIdx],
                size: 20 + (multiplier * 4) 
            });
        }

        function spawnFloatingText(msg, color, yOffset) {
            particles.push({
                type: 'text',
                x: cw / 2,
                y: ch / 2 - catRadius + yOffset,
                vy: 30,
                life: 2.0,
                text: msg,
                color: color
            });
        }

        function updateAndDrawParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.y -= p.vy * dt;
                p.life -= dt;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = Math.min(1, p.life * 1.5); 

                if (p.type === 'heart') {
                    ctx.font = `${p.size}px sans-serif`;
                    ctx.fillText(p.emoji, p.x, p.y);
                    
                } else if (p.type === 'score') {
                    ctx.font = `bold ${p.size}px sans-serif`;
                    ctx.fillStyle = p.color;
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    ctx.strokeText(p.text, p.x, p.y);
                    ctx.fillText(p.text, p.x, p.y);
                    
                } else if (p.type === 'text') {
                    let scale = p.life > 1.8 ? (2.0 - p.life)*5 : 1;
                    ctx.translate(p.x, p.y);
                    ctx.scale(scale, scale);
                    ctx.font = 'bold 40px sans-serif';
                    ctx.fillStyle = p.color;
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 4;
                    ctx.strokeText(p.text, 0, 0);
                    ctx.fillText(p.text, 0, 0);
                }
                ctx.restore();
            }
        }

        // --- Input Handling ---
        function handlePointerMove(e) {
            if (e.touches) return; 
            if (isGameOver || startScreen.style.display !== 'none') return;
            
            let dist = Math.hypot(e.clientX - (cw/2), e.clientY - (ch/2));
            canvas.style.cursor = dist < catRadius ? 'pointer' : 'default';
        }

        function handlePointerDown(e) {
            if (isGameOver || startScreen.style.display !== 'none') return;
            e.preventDefault(); 
            
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            if (e.touches) {
                pointer.x = e.touches[0].clientX;
                pointer.y = e.touches[0].clientY;
            } else {
                pointer.x = e.clientX;
                pointer.y = e.clientY;
            }
            
            let dist = Math.hypot(pointer.x - (cw/2), pointer.y - (ch/2));
            let now = performance.now();
            
            if (dist < catRadius) {
                if (catState === 2) {
                    triggerGameOver();
                } else {
                    // --- COMBO LOGIC ---
                    combo++;
                    comboMultiplier = 1 + Math.floor(combo / 5);
                    lastTapTime = now;
                    
                    let pointsEarned = 10 * comboMultiplier;
                    score += pointsEarned;
                    
                    playCombSound(comboMultiplier);
                    spawnHeart(pointer.x, pointer.y);
                    spawnFloatingScore(pointer.x, pointer.y, pointsEarned, comboMultiplier);
                    
                    clickAnimEndTime = now + 100; 
                    
                    // Restart AI timer if tapped while safe and timer isn't running
                    if (catState === 0 && !hasStartedClickingInSafeState) {
                        hasStartedClickingInSafeState = true;
                        scheduleNextState(); 
                    }
                    
                    if (score >= nextLevelScore) levelUp();
                }
            }
        }

        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});

    </script>
</body>
</html>
